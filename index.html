<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeuDelivery | Central de Documentação</title>
    <meta name="description" content="Central de ajuda e documentação técnica para o sistema TeuDelivery. Guias para administradores, clientes e motoboys.">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-bash.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-ini.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-php.min.js"></script>

    <link rel="stylesheet" href="style.css">
</head>
<body class="light-mode">
    <header id="header">
        <div class="logo">
            <span class="logo-icon">🚀</span>
            <h1>TeuDelivery <span>Docs</span></h1>
        </div>
        <div class="nav-actions">
            <button id="theme-toggle" title="Alternar tema">
                <span class="sun">☀️</span>
                <span class="moon">🌙</span>
            </button>
        </div>
    </header>

    <div class="container">
        <aside id="sidebar">
            <nav id="nav-list">
                <!-- Navigation injection -->
                <div class="nav-loading">Carregando menu...</div>
            </nav>
        </aside>

        <main id="content-area">
            <div id="breadcrumb"></div>
            <article id="markdown-viewer" class="prose">
                <div class="content-loading">
                    <div class="spinner"></div>
                    <p>Carregando documentação...</p>
                </div>
            </article>
            
            <footer id="content-footer">
                <hr>
                <div class="footer-links">
                    <p>© 2026 CODEMAKERS. Documentação oficial TeuDelivery.</p>
                </div>
            </footer>
        </main>
    </div>

    <!-- Mobile Menu Button -->
    <button id="mobile-nav-toggle">☰</button>

    <script src="script.js"></script>
</body>
</html>
